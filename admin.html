<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Order Admin • Sweet Tooth Cravings</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400;500;600&display=swap');
    body { font-family: 'Inter', system-ui, sans-serif; }
    .heading-serif { font-family: 'Playfair Display', Georgia, serif; font-weight: 700; }
    .form-input { transition: all 0.15s ease; }
    .form-input:focus { outline: none; border-color: #C9A9E8; box-shadow: 0 0 0 3px rgba(201, 169, 232, 0.25); }
  </style>
</head>
<body class="bg-[#FDF8F5] text-[#3F2A2B] min-h-screen flex flex-col">
  <header class="border-b border-[#EDE4DC] bg-white/95 backdrop-blur px-4 sm:px-8 py-4 flex items-center justify-between">
    <a href="/" class="text-sm text-[#8B6F6F] hover:text-[#3F2A2B]">← Back to website</a>
    <span class="heading-serif text-lg">Custom Orders</span>
    <button id="logout-btn" class="hidden text-xs text-[#8B6F6F] hover:text-[#3F2A2B]">Log out</button>
  </header>

  <div id="login-view" class="flex-1 flex items-center justify-center px-4 py-16">
    <form id="login-form" class="w-full max-w-sm bg-white border border-[#EDE4DC] rounded-3xl p-8 shadow-sm">
      <h1 class="heading-serif text-2xl text-center">Admin login</h1>
      <p class="text-sm text-[#6B5B5F] text-center mt-2">Review requests & send Stripe payment links</p>
      <input type="password" id="login-password" class="form-input mt-6 w-full border border-[#EDE4DC] rounded-2xl px-4 h-12" placeholder="Password" required>
      <p id="login-error" class="hidden mt-2 text-sm text-red-600"></p>
      <button type="submit" class="mt-4 w-full h-12 bg-[#C9A9E8] hover:bg-[#B48AE0] text-white rounded-3xl font-semibold">Sign in</button>
    </form>
  </div>

  <div id="dashboard-view" class="hidden flex-1 flex flex-col lg:flex-row min-h-0">
    <aside class="lg:w-80 border-b lg:border-b-0 lg:border-r border-[#EDE4DC] bg-white flex flex-col">
      <div class="p-4 flex flex-wrap gap-1" id="filter-tabs"></div>
      <div id="order-list" class="flex-1 overflow-y-auto max-h-[45vh] lg:max-h-none"></div>
    </aside>
    <main id="order-detail" class="flex-1 overflow-y-auto p-4 sm:p-8">
      <p class="text-sm text-[#8B6F6F]">Select an order to review</p>
    </main>
  </div>

  <script>
    const STATUS_LABELS = {
      pending_review: 'Needs review',
      quoted: 'Price set',
      payment_sent: 'Link sent',
      paid: 'Paid',
      declined: 'Declined'
    };

    let orders = [];
    let selectedId = null;
    let filter = 'pending_review';

    async function api(path, opts = {}) {
      const res = await fetch(path, { credentials: 'same-origin', ...opts });
      const data = await res.json().catch(() => ({}));
      if (!res.ok) throw new Error(data.error || 'Request failed');
      return data;
    }

    async function checkSession() {
      const { authenticated } = await api('/api/admin/session');
      document.getElementById('login-view').classList.toggle('hidden', authenticated);
      document.getElementById('dashboard-view').classList.toggle('hidden', !authenticated);
      document.getElementById('logout-btn').classList.toggle('hidden', !authenticated);
      if (authenticated) loadOrders();
    }

    document.getElementById('login-form').onsubmit = async (e) => {
      e.preventDefault();
      const err = document.getElementById('login-error');
      err.classList.add('hidden');
      try {
        await api('/api/admin/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password: document.getElementById('login-password').value })
        });
        checkSession();
      } catch {
        err.textContent = 'Wrong password';
        err.classList.remove('hidden');
      }
    };

    document.getElementById('logout-btn').onclick = async () => {
      await api('/api/admin/logout', { method: 'POST' });
      orders = [];
      selectedId = null;
      checkSession();
    };

    async function loadOrders() {
      const data = await api('/api/orders');
      orders = data.orders;
      if (!selectedId && orders.length) {
        const pending = orders.find(o => o.status === 'pending_review');
        selectedId = pending ? pending.id : orders[0].id;
      }
      renderFilters();
      renderList();
      renderDetail();
    }

    function renderFilters() {
      const tabs = [
        ['pending_review', 'New'],
        ['payment_sent', 'Awaiting pay'],
        ['paid', 'Paid'],
        ['all', 'All']
      ];
      document.getElementById('filter-tabs').innerHTML = tabs.map(([key, label]) => {
        const count = key === 'all' ? orders.length : orders.filter(o => o.status === key).length;
        const active = filter === key;
        return `<button type="button" data-filter="${key}" class="px-3 py-1.5 rounded-2xl text-xs font-medium ${active ? 'bg-[#C9A9E8] text-white' : 'bg-[#FDF8F5] border border-[#EDE4DC]'}">${label} (${count})</button>`;
      }).join('');
      document.getElementById('filter-tabs').querySelectorAll('button').forEach(btn => {
        btn.onclick = () => { filter = btn.dataset.filter; renderList(); };
      });
    }

    function renderList() {
      const list = orders.filter(o => filter === 'all' || o.status === filter);
      const el = document.getElementById('order-list');
      if (!list.length) {
        el.innerHTML = '<p class="p-6 text-center text-sm text-[#8B6F6F]">No orders here</p>';
        return;
      }
      el.innerHTML = list.map(o => `
        <button type="button" data-id="${o.id}" class="w-full text-left px-4 py-4 border-b border-[#EDE4DC]/60 ${selectedId === o.id ? 'bg-[#F5EEFC]' : 'hover:bg-[#FDF8F5]'}">
          <div class="flex justify-between gap-2">
            <span class="font-semibold text-sm">${escapeHtml(o.customerName)}</span>
            <span class="text-[10px] font-semibold px-2 py-0.5 rounded-full ${o.status === 'pending_review' ? 'bg-amber-100 text-amber-900' : 'bg-[#EDE4DC] text-[#5C4A4B]'}">${STATUS_LABELS[o.status] || o.status}</span>
          </div>
          <div class="text-xs text-[#6B5B5F] mt-1">${escapeHtml(o.cakeName)} · ${escapeHtml(o.sizeLabel)}</div>
          <div class="text-[10px] text-[#8B6F6F] mt-1">${new Date(o.createdAt).toLocaleString()}</div>
        </button>
      `).join('');
      el.querySelectorAll('button[data-id]').forEach(btn => {
        btn.onclick = () => { selectedId = btn.dataset.id; renderList(); renderDetail(); };
      });
    }

    function renderDetail() {
      const o = orders.find(x => x.id === selectedId);
      const el = document.getElementById('order-detail');
      if (!o) {
        el.innerHTML = '<p class="text-sm text-[#8B6F6F]">Select an order to review</p>';
        return;
      }
      let images = [];
      try { images = JSON.parse(o.inspirationImages || '[]'); } catch {}
      const priceDefault = o.finalPriceCents ? (o.finalPriceCents / 100) : (o.sizePriceHint || '');

      el.innerHTML = `
        <div class="max-w-2xl">
          <div class="flex flex-wrap justify-between gap-3 items-start">
            <div>
              <h2 class="heading-serif text-2xl">${escapeHtml(o.customerName)}</h2>
              <a href="mailto:${escapeHtml(o.customerEmail)}" class="text-sm text-[#C9A9E8]">${escapeHtml(o.customerEmail)}</a>
              ${o.customerPhone ? `<p class="text-sm text-[#6B5B5F]">${escapeHtml(o.customerPhone)}</p>` : ''}
            </div>
            <span class="text-xs font-semibold px-3 py-1 rounded-full bg-[#F5EEFC]">${STATUS_LABELS[o.status]}</span>
          </div>

          <div class="mt-6 grid sm:grid-cols-2 gap-4">
            <div class="bg-white border border-[#EDE4DC] rounded-3xl p-4 text-sm">
              <div class="text-xs uppercase tracking-widest text-[#C9A9E8] font-semibold mb-2">Cake</div>
              <p class="font-medium">${escapeHtml(o.cakeName)}</p>
              <p class="text-[#6B5B5F]">${escapeHtml(o.sizeLabel)}</p>
            </div>
            <div class="bg-white border border-[#EDE4DC] rounded-3xl p-4 text-sm">
              <div class="text-xs uppercase tracking-widest text-[#C9A9E8] font-semibold mb-2">Flavor & filling</div>
              <p>${escapeHtml(o.flavor || '—')}</p>
              <p class="text-[#6B5B5F]">${escapeHtml(o.filling || '—')}</p>
            </div>
          </div>

          <div class="mt-4 bg-white border border-[#EDE4DC] rounded-3xl p-5">
            <div class="text-xs uppercase tracking-widest text-[#C9A9E8] font-semibold">Decorations</div>
            <p class="mt-2 text-sm whitespace-pre-wrap leading-relaxed">${escapeHtml(o.decorationNotes)}</p>
          </div>

          ${o.allergies || o.additionalNotes ? `
            <div class="mt-4 bg-white border border-[#EDE4DC] rounded-3xl p-5 text-sm space-y-2">
              ${o.allergies ? `<p><span class="font-semibold text-[#C9A9E8]">Allergies:</span> ${escapeHtml(o.allergies)}</p>` : ''}
              ${o.additionalNotes ? `<p><span class="font-semibold text-[#C9A9E8]">Notes:</span> ${escapeHtml(o.additionalNotes)}</p>` : ''}
            </div>` : ''}

          ${o.eventDate ? `<p class="mt-4 text-sm"><strong>Event date:</strong> ${new Date(o.eventDate).toLocaleDateString()}</p>` : ''}

          ${images.length ? `
            <div class="mt-6">
              <div class="text-xs uppercase tracking-widest text-[#C9A9E8] font-semibold mb-3">Inspiration</div>
              <div class="grid grid-cols-2 sm:grid-cols-3 gap-2">
                ${images.map(src => `<a href="${src}" target="_blank" class="block aspect-square rounded-2xl overflow-hidden bg-[#F9F1EB]"><img src="${src}" class="w-full h-full object-cover" alt=""></a>`).join('')}
              </div>
            </div>` : ''}

          <div class="mt-8 bg-[#F5EEFC]/80 border-2 border-[#C9A9E8]/30 rounded-3xl p-5">
            <h3 class="font-semibold text-lg">Price & Stripe link</h3>
            ${o.sizePriceHint ? `<p class="text-xs text-[#6B5B5F] mt-1">Menu starting price: $${o.sizePriceHint}</p>` : ''}
            <div class="mt-4 flex flex-wrap gap-3 items-end">
              <div class="flex-1 min-w-[140px]">
                <label class="text-sm font-medium">Final price ($)</label>
                <input type="number" min="0" step="0.01" id="price-input" value="${priceDefault}" class="form-input mt-2 w-full border border-[#EDE4DC] rounded-2xl px-4 h-12">
              </div>
              <button type="button" id="save-price-btn" class="h-12 px-5 border border-[#EDE4DC] rounded-3xl font-semibold text-sm hover:bg-white">Save price</button>
            </div>
            <textarea id="admin-notes" class="form-input mt-4 w-full border border-[#EDE4DC] rounded-2xl px-4 py-3 text-sm min-h-[72px]" placeholder="Internal notes (only you see these)">${escapeHtml(o.adminNotes || '')}</textarea>
            <button type="button" id="stripe-btn" class="mt-4 w-full sm:w-auto h-12 px-8 bg-[#C9A9E8] hover:bg-[#B48AE0] text-white rounded-3xl font-semibold">Create Stripe payment link</button>
            <p id="action-msg" class="mt-3 text-sm font-medium hidden"></p>
            ${o.stripePaymentUrl ? `
              <div class="mt-4 bg-white rounded-2xl p-4 text-sm">
                <p class="font-medium">Payment link</p>
                <a href="${escapeHtml(o.stripePaymentUrl)}" target="_blank" class="text-[#C9A9E8] break-all text-xs mt-1 block">${escapeHtml(o.stripePaymentUrl)}</a>
                <button type="button" id="copy-link-btn" class="mt-2 text-xs underline text-[#6B5B5F]">Copy link</button>
              </div>` : ''}
            <div class="mt-4 flex gap-4 text-xs">
              <button type="button" id="decline-btn" class="text-[#8B6F6F] underline">Mark declined</button>
              ${o.status === 'payment_sent' ? '<button type="button" id="paid-btn" class="text-[#8B6F6F] underline">Mark paid manually</button>' : ''}
            </div>
          </div>
        </div>
      `;

      document.getElementById('save-price-btn').onclick = async () => {
        const cents = Math.round(parseFloat(document.getElementById('price-input').value) * 100);
        await api(`/api/orders/${o.id}`, {
          method: 'PATCH',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ finalPriceCents: cents, status: 'quoted', adminNotes: document.getElementById('admin-notes').value })
        });
        showMsg('Price saved');
        loadOrders();
      };

      document.getElementById('stripe-btn').onclick = async () => {
        try {
          const data = await api(`/api/orders/${o.id}/payment-link`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ finalPrice: document.getElementById('price-input').value })
          });
          if (data.paymentUrl) await navigator.clipboard.writeText(data.paymentUrl);
          showMsg('Payment link created & copied!');
          loadOrders();
        } catch (e) {
          showMsg(e.message, true);
        }
      };

      const copyBtn = document.getElementById('copy-link-btn');
      if (copyBtn) copyBtn.onclick = () => navigator.clipboard.writeText(o.stripePaymentUrl);

      document.getElementById('decline-btn').onclick = async () => {
        await api(`/api/orders/${o.id}`, { method: 'PATCH', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ status: 'declined' }) });
        loadOrders();
      };
      const paidBtn = document.getElementById('paid-btn');
      if (paidBtn) paidBtn.onclick = async () => {
        await api(`/api/orders/${o.id}`, { method: 'PATCH', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ status: 'paid' }) });
        loadOrders();
      };
    }

    function showMsg(text, isErr) {
      const el = document.getElementById('action-msg');
      el.textContent = text;
      el.className = 'mt-3 text-sm font-medium ' + (isErr ? 'text-red-600' : 'text-[#3F2A2B]');
      el.classList.remove('hidden');
    }

    function escapeHtml(s) {
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    checkSession();
  </script>
</body>
</html>
